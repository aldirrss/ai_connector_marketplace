name: CI — Backend

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "registry/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check backend/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        if: hashFiles('tests/**/*.py') != ''

      - name: Validate registry JSON
        run: python -c "
          import json, sys
          with open('registry/mcps.json') as f:
              data = json.load(f)
          assert isinstance(data, list), 'Registry must be a list'
          for entry in data:
              assert 'id' in entry, f'Missing id in entry: {entry}'
              assert 'transport' in entry, f'Missing transport in: {entry[\"id\"]}'
          print(f'Registry OK — {len(data)} entries validated')
        "
